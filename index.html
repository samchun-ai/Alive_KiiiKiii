<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>KIKI — My Idol Parallel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #root { width: 100%; height: 100%; }

    /* ── YouTube fullscreen background ── */
    #yt-wrap {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      background: #000;
    }
    #yt-wrap iframe {
      position: absolute;
      /* oversized so letterbox never shows */
      top: 50%; left: 50%;
      width: 177.78vh;   /* 16/9 * 100vh */
      height: 100vh;
      min-width: 100vw;
      min-height: 56.25vw; /* 9/16 * 100vw */
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
    }
    /* dark gradient scrim over the video */
    #yt-scrim {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.15) 40%,
        rgba(0,0,0,0.25) 70%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ── App overlay ── */
    #app-root { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }

    @keyframes bgRain {
      0%   { transform: translateY(-30px); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    @keyframes charRain {
      0%   { transform: translateY(-8px); opacity: 0; }
      10%  { opacity: 0.75; }
      88%  { opacity: 0.75; }
      100% { transform: translateY(520px); opacity: 0; }
    }
    @keyframes breathe {
      0%,100% { transform: scaleY(1) translateY(0px); }
      50%     { transform: scaleY(0.985) translateY(4px); }
    }
    @keyframes blinkAnim {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.08); }
    }
    @keyframes charBounce {
      0%   { transform: translateY(0) scale(1); }
      18%  { transform: translateY(-24px) scale(1.04,.96); }
      38%  { transform: translateY(-8px) scale(.97,1.03); }
      55%  { transform: translateY(-15px) scale(1.02,.98); }
      72%  { transform: translateY(-4px) scale(.99,1.01); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.6) translateY(10px); opacity: 0; }
      65%  { transform: scale(1.06) translateY(-3px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes godRay {
      0%,100% { opacity: 0.06; transform: skewX(-18deg) scaleX(1); }
      50%     { opacity: 0.18; transform: skewX(-18deg) scaleX(1.08); }
    }
    @keyframes steam {
      0%   { transform: translateY(0) scaleX(1); opacity: 0; }
      15%  { opacity: 0.7; }
      60%  { transform: translateY(-38px) scaleX(1.3) rotate(8deg); opacity: 0.4; }
      100% { transform: translateY(-70px) scaleX(0.6) rotate(-5deg); opacity: 0; }
    }
    @keyframes drip {
      0%   { transform: translateY(0) scaleY(0.5); opacity: 0; }
      10%  { opacity: 1; transform: scaleY(1); }
      85%  { opacity: 1; }
      100% { transform: translateY(28px) scaleY(1.2); opacity: 0; }
    }
    @keyframes rippleAnim {
      0%   { transform: scale(0.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 0; }
    }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes sunGlow {
      0%,100% { opacity: 0.25; transform: scale(1); }
      50%     { opacity: 0.5; transform: scale(1.12); }
    }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes uiReveal  { from { opacity:0; transform:scaleY(0.92) translateY(10px); } to { opacity:1; transform:scaleY(1) translateY(0); } }
    @keyframes hintPulse { 0%,100%{opacity:.5;transform:translateY(0);} 50%{opacity:1;transform:translateY(-5px);} }
    @keyframes introFadeIn { from{opacity:0;transform:translateY(24px) scale(0.96);} to{opacity:1;transform:translateY(0) scale(1);} }
    @keyframes videoBgFadeIn { from{opacity:0;} to{opacity:1;} }
    @keyframes overlayFadeOut { from{opacity:1;} to{opacity:0;} }

    .kiki-breathe { animation: breathe 4.5s ease-in-out infinite; transform-origin: center bottom; }
    .kiki-bounce  { animation: charBounce 0.6s cubic-bezier(0.34,1.56,0.64,1); transform-origin: center bottom; }
    .kiki-blink   { animation: blinkAnim 0.18s linear; }
    .modal-in     { animation: fadeUp 0.28s ease-out; }
  </style>
</head>

<!-- YouTube IFrame API -->
<script>
  // Random segments (start, end) in seconds — from the MV
  // Video id: _gRb17iWi3E  (adjust these after you watch it!)
  const YT_SEGMENTS = [
    [4,   22],
    [30,  52],
    [60,  82],
    [95, 118],
    [130,150],
    [160,182],
  ];
  let ytPlayer = null;
  let segTimer  = null;

  function pickSegment() {
    return YT_SEGMENTS[Math.floor(Math.random() * YT_SEGMENTS.length)];
  }

  window.onYouTubeIframeAPIReady = function() {
    const [start] = pickSegment();
    ytPlayer = new YT.Player('yt-player', {
      videoId: '_gRb17iWi3E',
      playerVars: {
        autoplay: 1,
        mute: 1,           // must be muted for autoplay
        controls: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel: 0,
        showinfo: 0,
        start: start,
        playsinline: 1,
        loop: 0,
      },
      events: {
        onReady: function(e) {
          e.target.playVideo();
          scheduleNextSegment();
          // fade in the video wrapper
          document.getElementById('yt-wrap').style.animation = 'videoBgFadeIn 1.5s ease both';
        },
        onStateChange: function(e) {
          // If ended naturally, pick new segment
          if (e.data === YT.PlayerState.ENDED) {
            loadRandomSegment();
          }
        }
      }
    });
  };

  function scheduleNextSegment() {
    clearTimeout(segTimer);
    const [start, end] = pickSegment();
    const dur = (end - start) * 1000;
    segTimer = setTimeout(() => {
      loadRandomSegment();
    }, dur);
  }

  function loadRandomSegment() {
    clearTimeout(segTimer);
    const [start, end] = pickSegment();
    if (ytPlayer && ytPlayer.seekTo) {
      ytPlayer.seekTo(start, true);
      ytPlayer.playVideo();
      const dur = (end - start) * 1000;
      segTimer = setTimeout(loadRandomSegment, dur);
    }
  }

  // Load YouTube API
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
</script>

const SUNNY_QUOTES = [
  "햇살이 너무 좋다! 같이 음악 들을래? 🎵",
  "오늘 하늘 봤어? 진짜 예쁘지 않아? ☀️",
  "커피 한 잔 하면서 이야기 할까? ☕",
  "이런 날 드라이브 가고 싶지 않아? 🚗",
];
const RAINY_QUOTES = [
  "비 오네.. 우산 꼭 챙겨! 빗소리 좋다 그지? 🌧️",
  "이런 날엔 따뜻한 차 한 잔이 최고야 🍵",
  "우산 없으면 같이 쓰고 가자 💙",
  "빗소리 들으면서 같이 음악 들을까? 🎶",
];
const SONGS = [
  { title: "Cherry Blossom", artist: "KIKI" },
  { title: "Starlight",      artist: "KIKI" },
  { title: "Rain Drop",      artist: "KIKI" },
];
const SCHEDULE_OPTIONS = ["보컬 레슨 🎤", "안무 연습 💃"];
const COLLECTION_ITEMS  = ["포토카드 #001 ✨", "싸인 포스터 🖊️", "한정판 앨범 💿"];
const COSTUME_ITEMS     = ["맑은날 룩 ☀️", "비오는날 룩 🌧️", "무대 의상 🌟"];

const CHAR_DROPS = Array.from({length:22},(_,i)=>({
  id:i, left:3+Math.random()*94, delay:Math.random()*1.8, dur:0.5+Math.random()*0.4
}));
const DRIP_POS     = [12,28,44,60,76,90];
const RIPPLE_RINGS = [0,1,2];
const RAYS = Array.from({length:6},(_,i)=>({
  id:i, left:10+i*14, delay:i*0.4, width:18+Math.random()*24
}));

const P = (sunny) => ({
  acc:  sunny ? "#FFB347" : "#5BB8C8",
  acc2: sunny ? "#FF8C69" : "#3A9BB0",
  txt:  sunny ? "#1a1a1a" : "#0d2530",
  sub:  sunny ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.72)",
  tag:  sunny ? "rgba(255,224,178,0.18)" : "rgba(178,235,242,0.18)",
  tagS: sunny ? "rgba(255,224,178,0.85)" : "rgba(178,235,242,0.85)",
  glow: sunny ? "rgba(255,179,71,0.45)"  : "rgba(91,184,200,0.4)",
  card: sunny ? "rgba(255,253,245,0.82)" : "rgba(242,250,251,0.82)",
  border: sunny ? "rgba(255,179,71,0.35)" : "rgba(91,184,200,0.35)",
});

function App() {
  const [phase,        setPhase]        = useState("intro");
  const [introStep,    setIntroStep]    = useState(0);
  const [weather,      setWeather]      = useState("sunny");
  const [quoteIdx,     setQuoteIdx]     = useState(0);
  const [showBubble,   setShowBubble]   = useState(false);
  const [bouncing,     setBouncing]     = useState(false);
  const [blink,        setBlink]        = useState(false);
  const [activeModal,  setActiveModal]  = useState(null);
  const [voicePlaying, setVoicePlaying] = useState(false);
  const [voiceProgress,setVoiceProgress]= useState(0);
  const [time,         setTime]         = useState("");
  const [songIdx,      setSongIdx]      = useState(0);
  const [ripple,       setRipple]       = useState(false);

  const voiceTimerRef  = useRef(null);
  const blinkTimerRef  = useRef(null);
  const rippleTimerRef = useRef(null);

  const isIntro  = phase === "intro";
  const isReveal = phase === "revealing";
  const isUI     = phase === "ui";
  const isSunny  = weather === "sunny";
  const c        = P(isSunny);
  const quotes   = isSunny ? SUNNY_QUOTES : RAINY_QUOTES;

  // Intro sequence
  useEffect(() => {
    const t1 = setTimeout(() => setIntroStep(1), 900);
    const t2 = setTimeout(() => setIntroStep(2), 2500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  // Clock
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setTime(n.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
    };
    tick(); const id = setInterval(tick,1000); return ()=>clearInterval(id);
  },[]);

  // Song rotate
  useEffect(()=>{
    const id = setInterval(()=>setSongIdx(i=>(i+1)%SONGS.length),20000);
    return ()=>clearInterval(id);
  },[]);

  // Blink
  useEffect(()=>{
    const go=()=>{
      blinkTimerRef.current=setTimeout(()=>{
        setBlink(true); setTimeout(()=>setBlink(false),160); go();
      },4000+Math.random()*2000);
    };
    go(); return ()=>clearTimeout(blinkTimerRef.current);
  },[]);

  // Ripple
  useEffect(()=>{
    if(weather!=="rainy") return;
    const go=()=>{
      rippleTimerRef.current=setTimeout(()=>{
        setRipple(true); setTimeout(()=>setRipple(false),1200); go();
      },2200+Math.random()*1800);
    };
    go(); return ()=>clearTimeout(rippleTimerRef.current);
  },[weather]);

  // Rain DOM layer (CSS only, outside React for perf)
  useEffect(()=>{
    const layer = document.getElementById('rain-layer');
    if (!layer) return;
    if (!isSunny) {
      layer.style.display = 'block';
      if (!layer.hasChildNodes()) {
        for(let i=0;i<50;i++){
          const d = document.createElement('div');
          const left   = Math.random()*100;
          const delay  = Math.random()*2.5;
          const dur    = 0.55+Math.random()*0.55;
          const w      = 0.9+Math.random()*0.8;
          const h      = 12+Math.random()*16;
          d.style.cssText = `position:absolute;left:${left}%;top:0;width:${w}px;height:${h}px;background:linear-gradient(to bottom,transparent,rgba(130,200,220,0.75));border-radius:2px;animation:bgRain ${dur}s linear ${delay}s infinite;`;
          layer.appendChild(d);
        }
      }
    } else {
      layer.style.display = 'none';
    }
  },[isSunny]);

  // Reset on weather
  useEffect(()=>{ setShowBubble(false); setQuoteIdx(0); },[weather]);

  // Voice
  useEffect(()=>{
    if(voicePlaying){
      voiceTimerRef.current=setInterval(()=>{
        setVoiceProgress(p=>{
          if(p>=100){clearInterval(voiceTimerRef.current);setVoicePlaying(false);return 0;}
          return p+1.2;
        });
      },80);
    } else clearInterval(voiceTimerRef.current);
    return ()=>clearInterval(voiceTimerRef.current);
  },[voicePlaying]);

  const handleScreenClick = useCallback(()=>{
    if(phase==="intro"){
      setPhase("revealing");
      setTimeout(()=>setPhase("ui"),700);
    }
  },[phase]);

  const handleCharClick = useCallback((e)=>{
    e.stopPropagation();
    if(!isUI){ handleScreenClick(); return; }
    setBouncing(true); setTimeout(()=>setBouncing(false),600);
    setShowBubble(true); setQuoteIdx(i=>(i+1)%quotes.length);
  },[isUI, handleScreenClick, quotes.length]);

  const closeModal = ()=>{ setActiveModal(null); setVoicePlaying(false); setVoiceProgress(0); };

  const menuButtons = [
    {id:"schedule",   label:"스케줄", icon:"📅"},
    {id:"collection", label:"컬렉션", icon:"💎"},
    {id:"costume",    label:"코스튬", icon:"👗"},
    {id:"voice",      label:"보이스", icon:"🎙️"},
  ];

  // ── Character JSX (shared between intro/ui) ──────────────────────────
  const CharCard = ({size, height}) => (
    <div
      onClick={handleCharClick}
      className={`${bouncing?"kiki-bounce":"kiki-breathe"} ${blink?"kiki-blink":""}`}
      style={{
        position:"relative", zIndex:10,
        cursor:"pointer", userSelect:"none",
        width:size, height:height,
        transformOrigin:"center bottom",
        filter:`drop-shadow(0 20px 40px ${c.glow})`,
      }}
    >
      <div style={{
        width:"100%", height:"100%",
        borderRadius:"26px", overflow:"hidden",
        boxShadow:`0 16px 48px ${c.glow}`,
        border:`2px solid ${c.border}`,
        position:"relative",
        backdropFilter:"blur(2px)",
      }}>
        <img src={isSunny?SUNNY_IMG:RAINY_IMG} alt="Kiki" style={{
          width:"100%", height:"100%",
          objectFit:"cover", objectPosition:"center top",
          display:"block",
        }}/>

        {/* Rainy overlays */}
        {!isSunny && <>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(91,184,200,0.07) 0%,rgba(58,155,176,0.15) 100%)",pointerEvents:"none"}}/>
          {CHAR_DROPS.map(d=>(
            <div key={d.id} style={{
              position:"absolute",left:`${d.left}%`,top:0,
              width:"1.2px",height:"18px",
              background:"linear-gradient(to bottom,transparent,rgba(160,220,235,0.8))",
              borderRadius:"2px",
              animation:`charRain ${d.dur}s linear ${d.delay}s infinite`,
              pointerEvents:"none",zIndex:4,
            }}/>
          ))}
          {DRIP_POS.map((lp,i)=>(
            <div key={i} style={{
              position:"absolute",left:`${lp}%`,top:"12%",
              width:"3px",height:"6px",
              background:"rgba(130,210,230,0.9)",
              borderRadius:"50% 50% 60% 60%",
              animation:`drip ${1.4+i*0.23}s ease-in ${i*0.35}s infinite`,
              pointerEvents:"none",zIndex:5,
            }}/>
          ))}
        </>}

        {/* Sunny steam */}
        {isSunny && [0,1,2].map(i=>(
          <div key={i} style={{
            position:"absolute",
            left:`${62+i*5}%`,bottom:"22%",
            width:"4px",height:"10px",
            background:"rgba(255,255,255,0.75)",
            borderRadius:"50%",filter:"blur(2.5px)",
            animation:`steam ${2.2+i*0.4}s ease-out ${i*0.55}s infinite`,
            pointerEvents:"none",zIndex:5,
          }}/>
        ))}
      </div>

      {/* Glow halo */}
      <div style={{
        position:"absolute",inset:"-14px",borderRadius:"40px",
        background:`radial-gradient(ellipse,${c.glow} 0%,transparent 68%)`,
        zIndex:-1,pointerEvents:"none",
      }}/>

      {/* Ripple puddle */}
      {!isSunny && RIPPLE_RINGS.map(r=>(
        <div key={r} style={{
          position:"absolute",bottom:"-10px",left:"50%",
          transform:"translateX(-50%)",
          width:"80px",height:"26px",borderRadius:"50%",
          border:`2px solid rgba(91,184,200,${0.6-r*0.15})`,
          animation:ripple?`rippleAnim 1.2s ease-out ${r*0.28}s both`:"none",
          pointerEvents:"none",zIndex:6,
        }}/>
      ))}
    </div>
  );

  return (
    <div onClick={handleScreenClick} style={{
      position:"fixed",inset:0,zIndex:10,
      display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",
      cursor: isIntro?"pointer":"default",
      pointerEvents:"auto",
      fontFamily:"'Noto Sans KR',sans-serif",
    }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nunito:wght@400;600;700;800&display=swap');`}</style>

      {/* ══ INTRO ════════════════════════════════════════════════════════ */}
      {!isUI && (
        <div style={{
          position:"fixed",inset:0,zIndex:20,
          display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",
          opacity: isReveal ? 0 : 1,
          transition: isReveal ? "opacity 0.65s ease" : "none",
          pointerEvents: isReveal ? "none" : "auto",
        }}>
          {/* God rays (sunny only) */}
          {isSunny && RAYS.map(r=>(
            <div key={r.id} style={{
              position:"absolute",top:0,left:`${r.left}%`,
              width:`${r.width*2.5}px`,height:"100%",
              background:"linear-gradient(to bottom,rgba(255,230,100,0.4),transparent)",
              transform:"skewX(-18deg)",transformOrigin:"top center",
              animation:`godRay ${3.5+r.delay}s ease-in-out ${r.delay}s infinite`,
              pointerEvents:"none",zIndex:0,
            }}/>
          ))}

          {/* Character — big intro size */}
          <div style={{
            animation: introStep===0 ? "introFadeIn 0.9s cubic-bezier(0.34,1.2,0.64,1) both" : undefined,
            display:"flex",flexDirection:"column",alignItems:"center",
          }}>
            <CharCard
              size={`min(${Math.round(window.innerWidth*0.78)}px, 340px)`}
              height={`min(${Math.round(window.innerHeight*0.68)}px, 500px)`}
            />

            {/* Name tag */}
            {introStep >= 1 && (
              <div style={{
                marginTop:"22px",
                display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",
                animation:"slideUp 0.6s ease-out both",
              }}>
                {/* Glass pill */}
                <div style={{
                  background:"rgba(255,255,255,0.18)",
                  backdropFilter:"blur(12px)",
                  border:"1px solid rgba(255,255,255,0.35)",
                  borderRadius:"40px",
                  padding:"10px 28px",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",
                  boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
                }}>
                  <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:"30px",color:"#fff",letterSpacing:"8px",textShadow:"0 2px 12px rgba(0,0,0,0.3)"}}>KIKI</div>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,0.8)",fontWeight:600,letterSpacing:"3.5px"}}>MY IDOL PARALLEL</div>
                </div>
              </div>
            )}
          </div>

          {/* Hint */}
          {introStep >= 2 && (
            <div style={{
              position:"absolute",bottom:"44px",
              display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",
              animation:"hintPulse 2.2s ease-in-out infinite",
              zIndex:10,
            }}>
              <div style={{
                background:"rgba(255,255,255,0.18)",
                backdropFilter:"blur(10px)",
                border:"1px solid rgba(255,255,255,0.3)",
                borderRadius:"30px",
                padding:"10px 24px",
                display:"flex",alignItems:"center",gap:"8px",
              }}>
                <span style={{fontSize:"18px"}}>👆</span>
                <span style={{fontSize:"13px",color:"#fff",fontWeight:600,letterSpacing:"0.5px",textShadow:"0 1px 6px rgba(0,0,0,0.4)"}}>화면을 터치하세요</span>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ══ UI CARD ══════════════════════════════════════════════════════ */}
      {isUI && (
        <div style={{
          position:"relative",zIndex:20,
          width:"100%",maxWidth:"390px",
          height:"100vh",maxHeight:"820px",
          display:"flex",flexDirection:"column",
          overflow:"hidden",
          animation:"uiReveal 0.65s cubic-bezier(0.34,1.2,0.64,1) both",
        }}>
          {/* Glass card backdrop */}
          <div style={{
            position:"absolute",inset:0,
            background: isSunny
              ? "linear-gradient(160deg,rgba(255,253,240,0.78) 0%,rgba(255,248,220,0.72) 100%)"
              : "linear-gradient(160deg,rgba(235,248,252,0.78) 0%,rgba(220,242,248,0.72) 100%)",
            backdropFilter:"blur(22px)",
            WebkitBackdropFilter:"blur(22px)",
            borderRadius:"0",
            border:`1px solid ${c.border}`,
            transition:"background 0.8s",
            pointerEvents:"none",
            zIndex:0,
          }}/>

          {/* ── Header ────────────────────────────────────────────────── */}
          <div style={{
            position:"relative",zIndex:1,
            padding:"52px 22px 10px",
            display:"flex",alignItems:"center",justifyContent:"space-between",
            animation:"slideDown 0.5s 0.1s ease-out both",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{
                width:"36px",height:"36px",borderRadius:"12px",
                background:`linear-gradient(135deg,${c.acc},${c.acc2})`,
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:`0 4px 14px ${c.glow}`,
              }}>
                <span style={{color:"#fff",fontFamily:"Nunito",fontWeight:800,fontSize:"14px"}}>M</span>
              </div>
              <div>
                <div style={{fontFamily:"Nunito",fontWeight:800,fontSize:"18px",color:"#fff",letterSpacing:"-0.5px",textShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>KIKI</div>
                <div style={{fontSize:"9px",color:"rgba(255,255,255,0.8)",fontWeight:600,letterSpacing:"2px"}}>MY IDOL PARALLEL</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"12px",color:"rgba(255,255,255,0.85)",fontWeight:600,fontFamily:"Nunito",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>{time}</span>
              {/* Weather toggle */}
              <div onClick={(e)=>{e.stopPropagation();setWeather(w=>w==="sunny"?"rainy":"sunny");}} style={{
                cursor:"pointer",width:"66px",height:"32px",borderRadius:"16px",
                background:isSunny?"linear-gradient(90deg,#FFD700,#FFB347)":"linear-gradient(90deg,#5BB8C8,#3A9BB0)",
                padding:"4px",display:"flex",alignItems:"center",
                justifyContent:isSunny?"flex-end":"flex-start",
                transition:"all 0.5s ease",
                boxShadow:`0 3px 12px ${c.glow}`,
              }}>
                <div style={{width:"24px",height:"24px",borderRadius:"50%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",boxShadow:"0 2px 6px rgba(0,0,0,0.2)",transition:"all 0.5s ease"}}>
                  {isSunny?"☀️":"🌧️"}
                </div>
              </div>
            </div>
          </div>

          {/* Mood tag */}
          <div style={{position:"relative",zIndex:1,padding:"0 22px 6px",animation:"slideDown 0.5s 0.15s ease-out both"}}>
            <span style={{background:c.tag,backdropFilter:"blur(8px)",color:"#fff",fontSize:"10px",fontWeight:700,padding:"4px 14px",borderRadius:"20px",letterSpacing:"0.5px",border:`1px solid ${c.border}`,textShadow:"0 1px 4px rgba(0,0,0,0.25)"}}>
              {isSunny?"☀️ Sunny Day":"🌧️ Rainy Day"}
            </span>
          </div>

          {/* ── Scene ──────────────────────────────────────────────────── */}
          <div style={{
            position:"relative",zIndex:1,
            flex:1,
            display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"flex-end",
            overflow:"hidden",
            minHeight:0,
          }}>
            {/* God rays in card (subtle) */}
            {isSunny && RAYS.map(r=>(
              <div key={r.id} style={{
                position:"absolute",top:0,left:`${r.left}%`,
                width:`${r.width}px`,height:"120%",
                background:"linear-gradient(to bottom,rgba(255,230,100,0.5),transparent)",
                transform:"skewX(-18deg)",transformOrigin:"top center",
                animation:`godRay ${3.5+r.delay}s ease-in-out ${r.delay}s infinite`,
                pointerEvents:"none",zIndex:0,
              }}/>
            ))}

            {/* Speech bubble */}
            {showBubble && (
              <div key={quoteIdx} style={{
                position:"absolute",top:"16px",left:"50%",transform:"translateX(-50%)",
                background:"rgba(255,255,255,0.92)",
                backdropFilter:"blur(12px)",
                border:`2px solid ${c.acc}`,
                borderRadius:"22px",padding:"12px 20px",
                maxWidth:"270px",textAlign:"center",zIndex:30,
                boxShadow:`0 10px 28px ${c.glow}`,
                animation:"popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both",
              }}>
                <p style={{fontSize:"13.5px",color:"#1a1a1a",fontWeight:500,lineHeight:1.6}}>{quotes[quoteIdx]}</p>
                <div style={{position:"absolute",bottom:"-13px",left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"11px solid transparent",borderRight:"11px solid transparent",borderTop:`13px solid ${c.acc}`}}/>
              </div>
            )}

            {/* Character */}
            <div style={{marginBottom:"10px"}}>
              <CharCard size="clamp(200px,72vw,260px)" height="clamp(260px,48vh,360px)" />
            </div>

            {/* Tap hint */}
            <div style={{position:"relative",zIndex:10,marginBottom:"8px",fontSize:"11px",color:"rgba(255,255,255,0.7)",fontWeight:500,textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>
              👆 탭해서 키키와 대화하기
            </div>
          </div>

          {/* ── Now Playing ─────────────────────────────────────────────── */}
          <div style={{
            position:"relative",zIndex:1,
            margin:"0 14px 6px",borderRadius:"14px",
            background:"rgba(255,255,255,0.15)",
            backdropFilter:"blur(10px)",
            border:`1px solid ${c.border}`,
            padding:"8px 14px",
            display:"flex",alignItems:"center",gap:"8px",
            overflow:"hidden",
            animation:"slideUp 0.5s 0.3s ease-out both",
          }}>
            <span style={{fontSize:"13px",flexShrink:0}}>🎵</span>
            <div style={{flex:1,overflow:"hidden",position:"relative"}}>
              <div style={{display:"inline-block",animation:"marquee 14s linear infinite",whiteSpace:"nowrap",willChange:"transform"}}>
                <span style={{fontSize:"11px",color:"rgba(255,255,255,0.85)",fontWeight:600,paddingRight:"60px",textShadow:"0 1px 4px rgba(0,0,0,0.2)"}}>
                  함께 듣는 중: {SONGS[songIdx].title} — {SONGS[songIdx].artist}&nbsp;&nbsp;&nbsp;&nbsp;함께 듣는 중: {SONGS[songIdx].title} — {SONGS[songIdx].artist}
                </span>
              </div>
            </div>
          </div>

          {/* ── Menu Bar ────────────────────────────────────────────────── */}
          <div style={{
            position:"relative",zIndex:1,
            padding:"6px 14px 32px",
            display:"flex",gap:"8px",
            animation:"slideUp 0.5s 0.4s ease-out both",
          }}>
            {menuButtons.map(btn=>(
              <button key={btn.id}
                onClick={(e)=>{e.stopPropagation();setActiveModal(btn.id);}}
                style={{
                  flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",
                  padding:"10px 4px",borderRadius:"16px",border:`1px solid ${c.border}`,
                  background:"rgba(255,255,255,0.15)",
                  backdropFilter:"blur(10px)",
                  cursor:"pointer",transition:"all 0.22s ease",
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=c.acc;e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow=`0 6px 18px ${c.glow}`;}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.15)";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}
              >
                <span style={{fontSize:"20px"}}>{btn.icon}</span>
                <span style={{fontSize:"10px",color:"#fff",fontWeight:600,letterSpacing:"0.3px",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>{btn.label}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ══ Modals ══════════════════════════════════════════════════════ */}
      {activeModal && (
        <div onClick={(e)=>{e.stopPropagation();closeModal();}} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}}>
          <div className="modal-in" onClick={e=>e.stopPropagation()} style={{
            width:"100%",maxWidth:"390px",
            background:"rgba(255,255,255,0.92)",
            backdropFilter:"blur(20px)",
            borderRadius:"28px 28px 0 0",
            padding:"22px 22px 42px",
            boxShadow:"0 -10px 40px rgba(0,0,0,0.18)",
          }}>
            <div style={{width:"40px",height:"4px",borderRadius:"2px",background:"#CCC",margin:"0 auto 18px"}}/>

            {activeModal==="schedule" && <>
              <h3 style={{fontSize:"16px",fontWeight:700,color:"#1a1a1a",marginBottom:"14px"}}>📅 키키의 오늘 스케줄</h3>
              <p style={{fontSize:"11px",color:"#666",marginBottom:"12px"}}>참여할 스케줄을 선택하세요</p>
              {SCHEDULE_OPTIONS.map(opt=>(
                <div key={opt} onClick={()=>{alert(`"${opt}"에 함께해줘서 고마워! 💖`);closeModal();}}
                  style={{padding:"13px 16px",marginBottom:"9px",borderRadius:"14px",background:"#f5f5f5",cursor:"pointer",fontSize:"14px",fontWeight:600,color:"#1a1a1a",transition:"background 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=c.acc}
                  onMouseLeave={e=>e.currentTarget.style.background="#f5f5f5"}
                >{opt}</div>
              ))}
            </>}
            {activeModal==="collection" && <>
              <h3 style={{fontSize:"16px",fontWeight:700,color:"#1a1a1a",marginBottom:"14px"}}>💎 내 컬렉션</h3>
              {COLLECTION_ITEMS.map((item,i)=>(
                <div key={item} style={{padding:"11px 14px",marginBottom:"8px",borderRadius:"12px",background:"#f5f5f5",fontSize:"13px",fontWeight:500,color:"#1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{item}</span>
                  <span style={{fontSize:"10px",color:c.acc2,fontWeight:700}}>{["획득 완료","잠금 해제","한정판"][i]}</span>
                </div>
              ))}
            </>}
            {activeModal==="costume" && <>
              <h3 style={{fontSize:"16px",fontWeight:700,color:"#1a1a1a",marginBottom:"14px"}}>👗 코스튬 보관함</h3>
              {COSTUME_ITEMS.map((item,i)=>(
                <div key={item} style={{padding:"11px 14px",marginBottom:"8px",borderRadius:"12px",background:"#f5f5f5",fontSize:"13px",fontWeight:500,color:"#1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{item}</span>
                  <span style={{background:c.acc,color:"#fff",fontSize:"10px",fontWeight:700,padding:"2px 8px",borderRadius:"10px"}}>{i===0?"장착 중":"보유"}</span>
                </div>
              ))}
            </>}
            {activeModal==="voice" && <>
              <h3 style={{fontSize:"16px",fontWeight:700,color:"#1a1a1a",marginBottom:"4px"}}>🎙️ 키키의 음성 일기</h3>
              <p style={{fontSize:"11px",color:"#666",marginBottom:"18px"}}>새로운 음성 메시지가 도착했습니다 ✨</p>
              <div style={{background:"#f5f5f5",borderRadius:"18px",padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                  <div onClick={()=>{
                    try{const C=window.AudioContext||window.webkitAudioContext;if(!voicePlaying&&C){const ctx=new C(),o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(440,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+0.45);g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.5);}}catch(e){}
                    setVoicePlaying(p=>!p);if(voicePlaying)setVoiceProgress(0);
                  }} style={{width:"42px",height:"42px",borderRadius:"50%",background:`linear-gradient(135deg,${c.acc},${c.acc2})`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,boxShadow:`0 4px 14px ${c.glow}`}}>
                    <span style={{color:"#fff",fontSize:"16px"}}>{voicePlaying?"⏸":"▶️"}</span>
                  </div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:"12px",fontWeight:600,color:"#1a1a1a",marginBottom:"7px"}}>{!isSunny?"오늘의 비가 너무 좋아서... 🌧️":"햇살 좋은 오후의 일기 ☀️"}</p>
                    <div style={{height:"4px",borderRadius:"2px",background:"rgba(0,0,0,0.1)",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${voiceProgress}%`,background:`linear-gradient(90deg,${c.acc},${c.acc2})`,borderRadius:"2px",transition:"width 0.1s linear"}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"4px"}}>
                      <span style={{fontSize:"9px",color:"#888"}}>{Math.round(voiceProgress*0.28)}s</span>
                      <span style={{fontSize:"9px",color:"#888"}}>28s</span>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"2.5px",marginTop:"12px",height:"28px"}}>
                {Array.from({length:30},(_,i)=>(
                  <div key={i} style={{
                    width:"3px",
                    height:`${voicePlaying?(5+Math.abs(Math.sin(i*0.65))*18):(3+Math.abs(Math.sin(i*0.65))*10)}px`,
                    background:voiceProgress/100>i/30?c.acc:"rgba(0,0,0,0.1)",
                    borderRadius:"2px",transition:"height 0.2s,background 0.3s",
                  }}/>
                ))}
              </div>
            </>}
            <button onClick={closeModal} style={{marginTop:"14px",width:"100%",padding:"11px",borderRadius:"13px",border:"none",background:"transparent",color:"#888",fontSize:"12px",cursor:"pointer",fontWeight:600}}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(React.createElement(App));
</script>
</body>
</html>
